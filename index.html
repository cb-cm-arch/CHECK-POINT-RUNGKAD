  <div class="login-box">
    <input type="text" id="username" placeholder="🔍 CHECK POINT">
    <br>
    <button onclick="loadUser()">CHECK SEKARANG</button>

    <div id="result"></div>
  </div>

</div>

<script>
async function loadUser() {
  const input = document.getElementById("username").value.trim().toLowerCase();

  if (!input) {
    document.getElementById("result").innerHTML = "⚠️ Masukkan username";
    return;
  }

  document.getElementById("result").innerHTML = "🔄 Loading...";

  const url = "https://script.google.com/macros/s/AKfycbw76ovHoK2bFrwb22w6FXI_-N5ZS4b5TE2sOsmy8_0-wD_sXtZ50FHOT4BinLnzJbcc/exec?username=" + input;

  try {
    const res = await fetch(url);
    const user = await res.json();

    if (user && !user.error) {
      document.getElementById("result").innerHTML = `
        <h2>💰 SISA POINT</h2>
        <h1 style="font-size:50px;color:#00ffcc;">
          ${user["Sisa Point"]}
        </h1>
      `;
    } else {
      document.getElementById("result").innerHTML = "❌ Data tidak ditemukan";
    }

  } catch (e) {
    document.getElementById("result").innerHTML = "⚠️ Error ambil data";
  }
}
</script>
