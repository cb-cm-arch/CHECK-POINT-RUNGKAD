<script>

// 🔥 ANIMASI ANGKA NAIK (SMOOTH & HALUS)
function animateValue(id, start, end, duration) {
  let current = start;
  let range = end - start;
  let increment = Math.ceil(range / 60);
  let stepTime = Math.abs(Math.floor(duration / 60));

  let obj = document.getElementById(id);

  let timer = setInterval(function () {
    current += increment;

    if (current >= end) {
      current = end;
      clearInterval(timer);
    }

    obj.innerText = current.toLocaleString();
  }, stepTime);
}


// 🔥 LOAD USER
async function loadUser() {
  const inputEl = document.getElementById("username");
  const buttonEl = document.querySelector(".btn-premium");
  const input = inputEl.value.trim().toLowerCase();

  if (!input) {
    document.getElementById("result").innerHTML = "⚠️ Masukkan username";
    return;
  }

  // 🔥 efek klik tombol (halus & elegan)
  buttonEl.style.transform = "scale(0.96)";
  setTimeout(() => {
    buttonEl.style.transform = "scale(1)";
  }, 120);

  document.getElementById("result").innerHTML = "🔄 Loading...";

  const url = "https://script.google.com/macros/s/AKfycbxGttDyxDaIqzjYnVa30WxtPoCigubCKveDtj-lTei1aAJLRzIX07FSE1dSeq-WwYs8SQ/exec?username=" + input;

  try {
    const res = await fetch(url);
    const user = await res.json();

    if (user && !user.error) {

      // 🔥 hide input & tombol
      inputEl.style.display = "none";
      buttonEl.style.display = "none";

      document.getElementById("result").innerHTML = `
        <h3 style="opacity:0.7;">Username</h3>
        <h2 style="color:#00c6ff;">
          ${user["Username"]}
        </h2>

        <h3 style="margin-top:10px;">Point Saat Ini</h3>
        <h1 id="point" class="glow-point">0</h1>

        <button onclick="resetForm()" class="btn-premium" style="margin-top:20px;">
          CEK LAGI
        </button>
      `;

      // 🔥 animasi angka (lebih smooth)
      setTimeout(() => {
        animateValue("point", 0, parseInt(user["Sisa Point"]), 1000);
      }, 200);

    } else {
      document.getElementById("result").innerHTML = `
        <div class="fancy-text">
  Mohon maaf kak, <span>data point</span> Kakak belum tersedia.<br>
  Silakan hubungi <span>admin</span> untuk informasi lebih lanjut 🙏
</div>
      `;
    }

  } catch (e) {
    document.getElementById("result").innerHTML = "⚠️ Error ambil data";
  }
}


// 🔥 RESET (CEK LAGI)
function resetForm() {
  const inputEl = document.getElementById("username");
  const buttonEl = document.querySelector(".btn-premium");

  inputEl.style.display = "block";
  buttonEl.style.display = "inline-block";

  inputEl.value = "";
  document.getElementById("result").innerHTML = "";
}


// 🔥 ENTER = LANGSUNG CHECK
document.addEventListener("DOMContentLoaded", function() {
  const inputEl = document.getElementById("username");

  inputEl.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      loadUser();
    }
  });
});

</script>
