<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbz2aXlWn_1cdirIurJ4xWFRwY_Tzia1cjKGB9L5z5r6KEraHX5gIeFDMpypSwprEG0_/exec";


// 🔥 ANIMASI ANGKA
function animateValue(id, start, end, duration) {

  let current = start;
  let range = end - start;

  let increment = Math.ceil(range / 60);

  let stepTime = Math.abs(
    Math.floor(duration / 60)
  );

  let obj = document.getElementById(id);

  let timer = setInterval(function () {

    current += increment;

    if (current >= end) {

      current = end;

      clearInterval(timer);
    }

    obj.innerText =
      current.toLocaleString();

  }, stepTime);
}


// 🔥 LOAD USER
async function loadUser() {

  const inputEl =
    document.getElementById("username");

  const buttonEl =
    document.querySelector(".btn-premium");

  const input =
    inputEl.value.trim().toLowerCase();

  if (!input) {

    document.getElementById("result").innerHTML =
      "⚠️ Masukkan username";

    return;
  }

  buttonEl.disabled = true;
  buttonEl.innerHTML = "LOADING...";

  document.getElementById("result").innerHTML =
    "🔄 Loading...";

  const url =
    API_URL +
    "?username=" +
    encodeURIComponent(input);

  try {

    const res = await fetch(url);

    const user = await res.json();

    if (user.username) {

      inputEl.style.display = "none";

      buttonEl.style.display = "none";

      document.getElementById("result").innerHTML = `

      <input
        type="hidden"
        id="claimUsername"
        value="${user.username}"
      >

      <h3 style="opacity:0.7;">
        Username
      </h3>

      <h2 style="color:#00c6ff;">
        ${user.username}
      </h2>

      <h3 style="margin-top:10px;">
        Sisa Point
      </h3>

      <h1 id="point">
        0
      </h1>

      <div style="margin-top:20px; width:100%;">

        <input
          type="number"
          id="claimInput"
          placeholder="Masukkan nominal claim"
          style="
            width:70%;
            padding:8px;
            border:none;
            border-radius:10px;
            box-sizing:border-box;
            text-align:center;
            font-size:13px;
          "
        >

      </div>

      <button
        onclick="claimPoint()"
        class="btn-premium"
        id="claimBtn"
        style="margin-top:15px;"
      >
        CLAIM
      </button>

      <button
        onclick="resetForm()"
        class="btn-premium"
        style="margin-top:15px;"
      >
        CEK LAGI
      </button>

      `;

      setTimeout(() => {

        animateValue(
          "point",
          0,
          parseInt(user.point || 0),
          1000
        );

      }, 200);

    } else {

      document.getElementById("result").innerHTML = `
        Username tidak ditemukan 🙏
      `;

      buttonEl.disabled = false;
      buttonEl.innerHTML = "CHECK SEKARANG";
    }

  } catch (e) {

    console.log(e);

    document.getElementById("result").innerHTML =
      "⚠️ Error ambil data";

    buttonEl.disabled = false;
    buttonEl.innerHTML = "CHECK SEKARANG";
  }
}


// 🔥 RESET
function resetForm() {

  const inputEl =
    document.getElementById("username");

  const buttonEl =
    document.querySelector(".btn-premium");

  inputEl.style.display = "block";

  buttonEl.style.display = "block";

  buttonEl.disabled = false;

  buttonEl.innerHTML =
    "CHECK SEKARANG";

  inputEl.value = "";

  document.getElementById("result").innerHTML = "";
}


// 🔥 ENTER
document.addEventListener(
  "DOMContentLoaded",
  function () {

    const inputEl =
      document.getElementById("username");

    inputEl.addEventListener(
      "keypress",
      function (e) {

        if (e.key === "Enter") {

          loadUser();
        }

      }
    );

  }
);


// 🔥 CLAIM POINT
async function claimPoint() {

  const claimBtn =
    document.getElementById("claimBtn");

  const username =
    document.getElementById("claimUsername").value;

  const point =
    Number(
      document.getElementById("claimInput").value
    );

  // VALIDASI KOSONG
  if (!point) {

    alert("Masukkan nominal");

    return;
  }

  // MINIMAL
  if (point < 5) {

    alert("Minimal claim 5 point 😎");

    return;
  }

  // MAKSIMAL
  if (point > 500) {

    alert("Maksimal claim 500 point 😎");

    return;
  }

  // LOADING
  claimBtn.disabled = true;
  claimBtn.innerHTML = "LOADING...";

  const url =
    API_URL
    + "?claim=1"
    + "&username=" + encodeURIComponent(username)
    + "&point=" + encodeURIComponent(point);

  try {

    const res = await fetch(url);

    const data = await res.json();

    if (data.success) {

  const sisaPoint =
    Number(data.sisa || 0);

  animateValue(
    "point",
    0,
    sisaPoint,
    800
  );

  alert("CLAIM BERHASIL 😎🔥");

} else {

  alert(data.message || "CLAIM GAGAL");
}

  } catch (e) {

    console.log(e);

    alert("ERROR CLAIM");
  }

  claimBtn.disabled = false;
  claimBtn.innerHTML = "CLAIM";
}
