<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHECK POINT RUNGKAD</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: url("https://cdn.it-cg.group/mysterybox/uploads/6880d07b9f2fc.CB031%20BG%20Desktop.jpg") no-repeat center/cover;
}

/* CENTER */
.wrapper {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* LOGIN BOX */
.login-box {
  position: relative;
  z-index: 9999;

  width: 90%;
  max-width: 400px;
  padding: 25px;
  border-radius: 15px;

  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);

  text-align: center;
}

/* INPUT */
input {
  width: 80%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 15px;
}

/* BUTTON */
button {
  padding: 12px 25px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg,#1e90ff,#00c6ff);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}

/* RESULT */
#result {
  text-align: center;
  margin-top: 20px;
}

/* GIF (TIDAK GANGGU KLIK) */
.gif-floating {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%,-50%);
  pointer-events: none;
}

/* NAV (TIDAK NUTUP KLIK) */
.nav-game {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-around;
  padding: 8px;
  background: linear-gradient(180deg,#1e90ff,#004aad);
  z-index: 1000;

  pointer-events: none;
}

.nav-game a {
  color: white;
  text-decoration: none;
  pointer-events: auto;
  font-size: 12px;
}

/* BIAR KONTEN GA KEKETUTUP NAV */
body {
  padding-bottom: 70px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav-game">
  <a href="#">WhatsApp</a>
  <a href="#">Login</a>
  <a href="#">Telegram</a>
</div>

<!-- CENTER -->
<div class="wrapper">

  <div class="gif-floating">
    <img src="https://clickbet88sedekahrejeki05.xyz/storage/webpersonalize/d54f5304-03b3-49f7-b283-e6fe0c595ca7.gif" width="200">
  </div>

  <div class="login-box">
    <input type="text" id="username" placeholder="🔍 CHECK POINT">
    <br>
    <button onclick="loadUser()">CHECK SEKARANG</button>

    <div id="result"></div>
  </div>

</div>

<script>
async function loadUser() {
  const input = document.getElementById("username").value.trim().toLowerCase();

  if (!input) {
    document.getElementById("result").innerHTML = "⚠️ Masukkan username";
    return;
  }

  document.getElementById("result").innerHTML = "🔄 Loading...";

  const url = "https://script.google.com/macros/s/AKfycbxV8u2ln4NFKKDuRfA9FR7g6GTNIxK6R8IKd3mNcCcdmnkMG1riODmWw0fQGh5b0BMS/exec" + input;

  try {
    const res = await fetch(url);
    const user = await res.json();

    if (user && !user.error) {
      document.getElementById("result").innerHTML = `
        <h2>💰 SISA POINT</h2>
        <h1 style="font-size:50px;color:#00ffcc;">
          ${user["Sisa Point"]}
        </h1>
      `;
    } else {
      document.getElementById("result").innerHTML = "❌ Data tidak ditemukan";
    }

  } catch (e) {
    document.getElementById("result").innerHTML = "⚠️ Error ambil data";
  }
}
</script>

</body>
</html>
