<!DOCTYPE html>

<head>

<style>

/* BODY */
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: url("https://cdn.it-cg.group/mysterybox/uploads/6880d07b9f2fc.CB031%20BG%20Desktop.jpg") no-repeat center/cover;
  overflow: hidden;
}

/* CENTER */
.wrapper {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* BOX */
.login-box {
  width: 90%;
  max-width: 320px;
  padding: 25px;
  border-radius: 20px;

  background: rgba(0,0,40,0.8);
  backdrop-filter: blur(15px);

  border: 1px solid rgba(0,255,255,0.3);

  box-shadow:
    0 0 25px rgba(0,255,255,0.2),
    inset 0 0 20px rgba(0,255,255,0.1);

  display: flex;
  flex-direction: column;
  align-items: center;
}

/* FORM */
.form-group {
  width: 100%;
  max-width: 240px;
  margin-bottom: 20px;
  text-align: center;
}

.form-group label {
  display: block;
  margin-bottom: 12px; /* 🔥 tambah jarak ke bawah */
  font-size: 13px;
}

/* INPUT */
.form-group {
  width: 100%;
}

.form-group input {
  width: 100%;
  box-sizing: border-box; /* 🔥 ini kunci */
  padding: 10px;

  border-radius: 10px;
  border: none;

 text-align: left; /* 🔥 geser ke kiri */
}
/* BUTTON */
.btn-premium {
  padding: 12px 25px;
  border-radius: 30px;
  border: none;

  background: linear-gradient(90deg,#00c6ff,#0072ff);
  color: white;
  font-weight: bold;
  cursor: pointer;

  box-shadow: 0 0 15px rgba(0,150,255,0.7);
}

.btn-premium:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(0,200,255,1);
}

/* RESULT */
#result {
  margin-top: 20px;
  text-align: center;
}

/* GIF */
.gif-floating {
  position: absolute;
  top: 18%;
  left: 50%;
  transform: translate(-50%,-50%);

  z-index: 9999; /* 🔥 selalu di atas */
  pointer-events: none;
}
  .login-box {
  margin-top: 60px; /* 🔥 kasih space ke bawah */
}

/* NAVBAR */
.nav-game {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);

  width: 90%;
  max-width: 420px;

  display: flex;
  justify-content: space-around;
  align-items: center;

  padding: 12px;
  border-radius: 20px;

  background: rgba(0,60,120,0.6);
  backdrop-filter: blur(15px);

  border: 1px solid rgba(0,255,255,0.3);

  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* NAV ICON */
.nav-icon {
  width: 55px;
  height: 55px;
  filter: drop-shadow(0 0 10px rgba(0,255,255,0.8));
}

/* NAV TEXT */
.nav-game a {
  text-align: center;
  color: white;
  text-decoration: none;
  font-size: 11px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav-game">

  <a href="https://click-lynk.com/WHATSAPP_OFFICIAL_CLICKBET88WL" target="_blank">
    <img src="https://cliply.co/wp-content/uploads/2021/08/372108180_WHATSAPP_ICON_400.gif" class="nav-icon">
    <div>WhatsApp</div>
  </a>

  <a href="https://direct.lc.chat/12319896" target="_blank">
    <img src="https://media.tenor.com/S65c088OseQAAAAj/livechat.gif" class="nav-icon">
    <div>Live Chat</div>
  </a>

  <a href="https://click-lynk.com/TELEGRAM_OFFCIAL_CLICKBET88WL" target="_blank">
    <img src="https://patung288-bo.l88x.cfd/upload/tele.gif" class="nav-icon">
    <div>Telegram</div>
  </a>

</div>

<!-- CONTENT -->
<div class="wrapper">

  <div class="gif-floating">
    <img src="https://clickbet88sedekahrejeki05.xyz/storage/webpersonalize/d54f5304-03b3-49f7-b283-e6fe0c595ca7.gif" width="200">
  </div>

  <div class="login-box">

    <div class="form-group">
      <label>CHECK POINT</label>
      <input type="text" id="username" placeholder="Enter User ID">
    </div>

    <button class="btn-premium" onclick="loadUser()">CHECK SEKARANG</button>

    <div id="result"></div>

  </div>

</div>

<script>
async function loadUser() {
  const input = document.getElementById("username").value.trim().toLowerCase();

  if (!input) {
    document.getElementById("result").innerHTML = "⚠️ Masukkan username";
    return;
  }

  document.getElementById("result").innerHTML = "🔄 Loading...";

  const url = "https://script.google.com/macros/s/AKfycbxGttDyxDaIqzjYnVa30WxtPoCigubCKveDtj-lTei1aAJLRzIX07FSE1dSeq-WwYs8SQ/exec?username=" + input;

  try {
    const res = await fetch(url);
    const user = await res.json();

    if (user && !user.error) {
      document.getElementById("result").innerHTML = `
        <h2>Point Saat Ini</h2>
        <h1 style="font-size:50px;color:#00ffcc;">
          ${user["Sisa Point"]}
        </h1>
      `;
    } else {
      document.getElementById("result").innerHTML = `
        <p>
          🙏 Mohon maaf, data point Anda belum tersedia.<br>
          Silakan hubungi admin untuk informasi lebih lanjut.
        </p>
      `;
    }

  } catch (e) {
    document.getElementById("result").innerHTML = "⚠️ Error ambil data";
  }
}
</script>

</body>
